name: Build GraalVM images

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-versions.outputs.versions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover Java versions
        id: set-versions
        run: |
          VERSIONS=$(find java/GraaLVM -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort -V)
          echo "Discovered Java versions: $VERSIONS"
          ARRAY="["
          FIRST=true
          for v in $VERSIONS; do
            if [ "$FIRST" = true ]; then
              ARRAY="${ARRAY}\"$v\""
              FIRST=false
            else
              ARRAY="${ARRAY},\"$v\""
            fi
          done
          ARRAY="${ARRAY}]"
          echo "versions=$ARRAY" >> $GITHUB_OUTPUT

  build-matrix:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ${{ fromJson(needs.discover.outputs.versions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./java/GraaLVM/${{ matrix.version }}
          file: ./java/GraaLVM/${{ matrix.version }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:java_graalvm_${{ matrix.version }}
            ghcr.io/${{ github.repository }}:java_graalvm_${{ matrix.version }}-${{ github.sha }}